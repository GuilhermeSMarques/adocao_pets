{% extends 'base.html' %}

{% block title %}Excluir {{ pet.nome }} - PetAdoção{% endblock %}

{% block content %}
  <section class="confirm-card">
    <h1>Excluir pet</h1>
    <p>Tem certeza que deseja excluir <strong>{{ pet.nome }}</strong>?</p>
    <p class="subtitle">Esta ação não pode ser desfeita.</p>

    <form method="post">
      {% csrf_token %}

      <div class="form-actions">
        <a href="{% url 'pets:pet_detail' pet.pk %}" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
      </div>
    </form>
  </section>
{% endblock %}
